
name: Ultimate Hybrid Video Bot

on:
  workflow_dispatch:
    inputs:
      token_selection:
        description: 'Facebook Token Select Karein'
        required: true
        type: choice
        options:
          - 'Token1'
          - 'Token2'
          - 'Token3'      # 🌟 NAYA: Token 3 Added
          - 'Dual'
          - 'Triple'      # 🌟 NAYA: Use all 3 tokens logic
        default: 'Dual'
      titles_list:
        description: 'Titles Array (Separate with ,,)'
        required: true
        default: 'Delhi Capitals vs Gujarat Titans Live Match Today,,Blockbuster Match DC vs GT'
      descs_list:
        description: 'Descriptions Array (Separate with ,,)'
        required: true
        default: 'DC take on GT in the latest IPL match. Watch the live action here without buffer,,The best IPL teams DC and GT face off!'
      hashtags:
        description: 'Hashtags (Space separated)'
        required: true
        default: '#IPL2026 #DCvsGT #DelhiCapitals #GujaratTitans #IPLLive #LiveMatch'
      target_url:
        description: 'Target Website URL'
        required: true
        default: 'https://dadocric.st/player.php?id=starsp'

      # 🛡️ SMART PROXY TOGGLE
      use_proxy:
        description: 'Proxy Use Karna Hai?'
        required: true
        type: choice
        options:
          - 'No (Proxy OFF)'
          - 'Yes (Proxy ON)'
          - 'Only First Time (Proxy FIRST)'
        default: 'No (Proxy OFF)'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install System Tools (FFmpeg & Chrome)
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg google-chrome-stable xvfb

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Node Libraries
      run: npm install puppeteer axios form-data

    - name: Start The Hybrid Bot
      env:
        FB_TOKEN_1: ${{ secrets.FB_TOKEN_1 }}
        FB_TOKEN_2: ${{ secrets.FB_TOKEN_2 }}
        FB_TOKEN_3: ${{ secrets.FB_TOKEN_3 }}  # 🌟 NAYA: Passing Token 3 from GitHub Secrets
        TOKEN_SELECTION: ${{ inputs.token_selection }} 
        GH_PAT: ${{ secrets.GH_PAT }}
        TITLES_LIST: ${{ inputs.titles_list }}
        DESCS_LIST: ${{ inputs.descs_list }}
        HASHTAGS: ${{ inputs.hashtags }}
        TARGET_URL: ${{ inputs.target_url }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_REF_NAME: ${{ github.ref_name }}
        
        # 🛡️ Proxy Variables
        USE_PROXY: ${{ inputs.use_proxy }}
        PROXY_IP: '31.59.20.176'
        PROXY_PORT: '6754'
        PROXY_USER: 'dgmtstlf'
        PROXY_PASS: 'pm4wnuro0gy9'
        
      run: xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" node video_bot.js



















